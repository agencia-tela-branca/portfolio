version: '3.8'

services:
  portfolio-frontend:
    image: agenciatelabranca/portfolio-frontend:latest
    container_name: portfolio-frontend
    ports:
      - "3001:80"
    networks:
      - default
    restart: always

  portfolio-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: portfolio-tunnel
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_PORTFOLIO_TOKEN}
    networks:
      - default
    restart: always

networks:
  infra_network:
    external: true
    name: infra_default
